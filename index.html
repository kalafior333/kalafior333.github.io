.grid{
    display:grid;

.tile{
    background:#1e293b;

    text-decoration:none;
    color:white;
    transition:0.2s;
    box-shadow:0 4px 15px rgba(0,0,0,0.3);
}

.tile:hover{
    transform:translateY(-5px);
    background:#334155;
}

.tile h2{
    margin-top:0;
}

.tile p{
    opacity:0.7;
}
